name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "*"

permissions:
  contents: read

jobs:
  lock_status:
    runs-on: ubuntu-latest
    outputs:
      pinned: ${{ steps.check.outputs.pinned }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install package
        run: uv sync --frozen

      - name: Check upstream lock status
        id: check
        run: |
          uv run python - <<'PY'
          import os
          from ebolasim.build import read_source_lock

          lock = read_source_lock("model-src/upstream.lock.yml")
          pinned = "false" if lock.is_placeholder else "true"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"pinned={pinned}\n")
          print(lock.to_json(pretty=True))
          print(f"pinned={pinned}")
          PY

  qa:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra docs --extra plot

      - name: Lint
        run: uv run ruff check src tests tools/ci tools/dev setup.py docs/vignettes/ebola2/replay_ebola2.py

      - name: Unit tests
        run: uv run pytest -q

      - name: Bytecode compile check
        run: uv run python -m compileall -q src tests tools/ci tools/dev setup.py

  build_pinned:
    runs-on: ubuntu-latest
    needs: [qa, lock_status]
    if: needs.lock_status.outputs.pinned == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra docs --extra plot

      - name: Validate upstream lock is pinned
        run: |
          uv run python - <<'PY'
          from ebolasim.build import read_source_lock
          lock = read_source_lock("model-src/upstream.lock.yml")
          if lock.is_placeholder:
              raise SystemExit(
                  "model-src/upstream.lock.yml still has placeholder values. "
                  "Pin the public upstream repository, ref, archive URL, and SHA256."
              )
          print(lock.to_json(pretty=True))
          PY

      - name: Build release bundle pass A
        run: |
          uv run python tools/ci/build_release_bundle.py \
            --overwrite \
            --workdir build/ci-release-a \
            --bundle-dir dist/release-bundle-a \
            --package-root src/ebolasim

      - name: Build release bundle pass B
        run: |
          uv run python tools/ci/build_release_bundle.py \
            --overwrite \
            --workdir build/ci-release-b \
            --bundle-dir dist/release-bundle-b \
            --package-root src/ebolasim

      - name: Reproducibility hash check
        run: |
          uv run python - <<'PY'
          import hashlib
          from pathlib import Path
          from ebolasim.build import detect_platform_id

          platform_id = detect_platform_id()
          a = Path("dist/release-bundle-a") / platform_id / "ebola-spatial-linux"
          b = Path("dist/release-bundle-b") / platform_id / "ebola-spatial-linux"

          def sha256(path: Path) -> str:
              digest = hashlib.sha256()
              digest.update(path.read_bytes())
              return digest.hexdigest()

          sha_a = sha256(a)
          sha_b = sha256(b)
          if sha_a != sha_b:
              raise SystemExit(
                  f"Reproducibility failure: {a} != {b} ({sha_a} != {sha_b})"
              )
          print(f"Reproducible binary SHA256: {sha_a}")
          PY

      - name: Build wheel and sdist
        run: uv build

      - name: Verify bundled binary is inside installed wheel
        run: |
          uv venv .venv-wheel --python 3.11
          uv pip install --python .venv-wheel/bin/python dist/*.whl
          .venv-wheel/bin/python - <<'PY'
          from ebolasim import resolve_executable

          print(resolve_executable())
          PY

      - name: Run bundled executable smoke check from installed wheel
        run: |
          .venv-wheel/bin/ebolasim run \
            --out build/wheel-smoke/run \
            --set "Population size=24" \
            --set "Number of realisations=1" \
            --set "Sampling time=7" \
            --timeout 30 \
            --pretty

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-ci
          path: |
            dist/release-bundle-a/
            dist/release-bundle-b/

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  deploy_docs:
    runs-on: ubuntu-latest
    needs: [qa]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra docs --extra plot

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build MkDocs site
        run: uv run mkdocs build --strict

      - name: Upload documentation site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy documentation to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
