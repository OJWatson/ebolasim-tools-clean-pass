name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "*"

jobs:
  qa:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint
        run: python -m ruff check src tests

      - name: Unit tests
        run: python -m pytest -q

      - name: Bytecode compile check
        run: python -m compileall -q src tests

  build_pinned:
    runs-on: ubuntu-latest
    needs: qa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build

      - name: Validate upstream lock is pinned
        run: |
          python - <<'PY'
          from ebolasim_tools.upstream import read_upstream_lock
          lock = read_upstream_lock("legacy-src/upstream.lock.yml")
          if lock.is_placeholder:
              raise SystemExit(
                  "legacy-src/upstream.lock.yml still has placeholder values. "
                  "Pin the public upstream repository, ref, archive URL, and SHA256."
              )
          print(lock.to_json(pretty=True))
          PY

      - name: Build release bundle pass A
        run: |
          python tools/ci/build_release_bundle.py \
            --overwrite \
            --workdir build/ci-release-a \
            --bundle-dir dist/release-bundle-a \
            --package-root src/ebolasim_tools

      - name: Build release bundle pass B
        run: |
          python tools/ci/build_release_bundle.py \
            --overwrite \
            --workdir build/ci-release-b \
            --bundle-dir dist/release-bundle-b \
            --package-root src/ebolasim_tools

      - name: Reproducibility hash check
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          from ebolasim_tools.bundled import detect_platform_id

          platform_id = detect_platform_id()
          a = Path("dist/release-bundle-a") / platform_id / "ebola-spatial-linux"
          b = Path("dist/release-bundle-b") / platform_id / "ebola-spatial-linux"

          def sha256(path: Path) -> str:
              digest = hashlib.sha256()
              digest.update(path.read_bytes())
              return digest.hexdigest()

          sha_a = sha256(a)
          sha_b = sha256(b)
          if sha_a != sha_b:
              raise SystemExit(
                  f"Reproducibility failure: {a} != {b} ({sha_a} != {sha_b})"
              )
          print(f"Reproducible binary SHA256: {sha_a}")
          PY

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify bundled binary is inside installed wheel
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          from ebolasim_tools.bundled import resolve_bundled_executable

          result = resolve_bundled_executable()
          print(result.to_json(pretty=True))
          assert result.ok, result.diagnostics
          PY

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-ci
          path: |
            dist/release-bundle-a/
            dist/release-bundle-b/

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
